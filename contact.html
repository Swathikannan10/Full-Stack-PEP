<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>GoodReads</title>
  <style>
    * {

        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: 'Segoe UI', Arial, sans-serif;
    }

    body{
        background: linear-gradient(135deg, #a8edea, #fed6e3);
        color: #333333;
        display: flex;
        flex-direction: column;
        min-height: 100vh;
        

    }
    
    header {
        text-align: center;
         padding: 20px;
    }

    header h1 {
        font-size: 32px;
        margin-bottom: 10px;
    }

    header p {
        color: rgb(7, 70, 44);
    }

    nav {
        display: flex;
        justify-content: center;
        gap: 20px;
        margin-bottom: 30px;
    }

    nav a {
        text-decoration: solid;
        color: #4a4a4a;
        padding: 10px 20px;
        border-radius: 20px;
        background: rgba(59, 59, 224, 0.15);
        transition: 0.3s;
    }
    nav a:hover {
        background: hsl(219, 79%, 66%);
        color: black;
}
.contact-section {
    text-align: center;
    margin-bottom: 20px;
}
hr {
    margin: 10px 0; 
    border: none;
    border-top: 1px solid #ccc;
}
footer {
    margin-top: auto;
    padding: 20px 0;
    text-align: center;
}
h2{
    text-align: center;
    margin-bottom: 10px;
}

form p{
    margin-bottom: 10px;
}
.contact-section {
    display: flex;
    flex-direction: column;
    align-items: center;
    margin-bottom: 40px;
}

/* Form card */
.contact-form {
    background: white;
    padding: 25px;
    border-radius: 15px;
    width: 90%;
    max-width: 400px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.1);
}

/* Each input group */
.form-group {
    margin-bottom: 15px;
    text-align: left;
}

/* Inputs + textarea */
.form-group input,
.form-group textarea {
    width: 100%;
    padding: 10px;
    border-radius: 8px;
    border: 1px solid #ccc;
    margin-top: 5px;
    outline: none;
    transition: border 0.3s;
}

/* Focus effect */
.form-group input:focus,
.form-group textarea:focus {
    border: 1px solid #1ca7ec;
}


.buttons {
    display: flex;
    justify-content: space-between;
}

.buttons input {
    padding: 10px 15px;
    border: none;
    border-radius: 20px;
    cursor: pointer;
    background: #1ca7ec;
    color: white;
    transition: 0.3s;
}


.buttons input:hover {
    background: #0d8ddb;
}
</style>

  
</head>
<body>
    <header>
        <h1>You are always wecome to contact us!📞</h1>
        <p>Any queries? Any needs? Then just contact us</p>
    </header>
    <nav>
        <a href="index.html">Home</a>
        <a href="discover.html">Discover</a>
        <a href="contact.html">Contact</a>

    </nav>   
    <main>
    <section class="contact-section">
    <h2>Any Needs? Then Contact Us!</h2>

    <form class="contact-form">
        
        <div class="form-group">
            <label>Name:</label>
            <input type="text" placeholder="Enter your name" required>
        </div>

        <div class="form-group">
            <label>Email:</label>
            <input type="email" placeholder="Enter your email" required>
        </div>

        <div class="form-group">
            <label>Message:</label>
            <textarea rows="5" placeholder="Write your message here..." required></textarea>
        </div>

        <div class="buttons">
            <input type="submit" value="Send Message">
            <input type="reset" value="Clear">
        </div>

    </form>
</section>
</main>

    <hr>

       
    <footer>
        <p>&copy;Made with ❤️ for book lovers </p>
    </footer>
    </body>
    </html>
