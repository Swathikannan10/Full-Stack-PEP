<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>GoodReads - Home</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Segoe UI', Arial, sans-serif;
}
body {
        background: linear-gradient(135deg, #a8edea, #fed6e3);
        color: #333333;
    }

    header {
        text-align: center;
        padding: 20px;
    }

    header h1 {
        font-size: 32px;
        margin-bottom: 10px;
    }

    header p {
        color: rgb(7, 70, 44);
    }

nav {
    display: flex;
    justify-content: center;
    gap: 20px;
    margin: 10px;
}

nav a {
    text-decoration: none;
    color: #072e1e;
    padding: 10px 20px;
    border-radius: 20px;
    background: rgba(211, 17, 49, 0.15);
    transition: 0.3s;
}

nav a:hover {
    background: hsl(219, 79%, 66%);
    color: black;
}

.slider-section {
    display: flex;
    flex-direction: column;
    align-items: center;
    margin-bottom: 40px;
    width: 100%;
    height: 300px;
    object-fit: cover;
    transition: transform 0.5s ease;
   
}
.slider-section:hover{
    transform: scale(1.05);
}


input[type="radio"] {
    display: none;
}

.slider {
    margin:20px;
    width: 90%;
    max-width: 600px;
    overflow: hidden;
    border-radius: 15px;
}

.slides {
   display: flex;
    width: 300%;
    transition: transform 0.5s ease-in-out;
}

.slide {
    width: 100%;
    flex-shrink: 0;
}

.slide img {
    width: 800px;
    height:400px;
    object-fit: cover;
}


#s1:checked ~ .slider .slides {
    transform: translateX(0%);
}

#s2:checked ~ .slider .slides {
    transform: translateX(-100%);
}

#s3:checked ~ .slider .slides {
    transform: translateX(-200%);
}

.dots {
    margin-top: 10px;
}

.dots label {
    height: 12px;
    width: 12px;
    margin: 5px;
    display: inline-block;
    background: gray;
    border-radius: 50%;
    cursor: pointer;
}

#s1:checked ~ .dots label[for="s1"],
#s2:checked ~ .dots label[for="s2"],
#s3:checked ~ .dots label[for="s3"] {
    background: white;
}

.card {
    width: 1000px; 
    margin: 20px auto;
    background: #0f08080d;
    border-radius: 50px;
    padding: 24px;
    transition: 0.4s; 
} 
.card:hover {
    box-shadow: 0 15px 500px rgba(0,0,0,0.8);
} 
.card h1 {
    margin-bottom: 20px;
    color: #333333;
} 
.booklist {
    display: flex;
    gap: 20px;
    justify-content: center;
} 
.bookcard {
    background: hsla(0, 32%, 49%, 0.051); 
    padding-bottom: 10px; 
    border-radius: 15px; 
    width: 200px; 
    text-align: center; 
    transition: 0.3s; 
} 
.bookcard:hover { 
    transform: scale(1.05); 
    box-shadow: 0 10px 50px rgba(0,0,0,0.6); 
} 
.bookcard img { 
    width: 100%; 
    border-radius: 10px; 
    margin-bottom: 10px; 
} 
.bookcard a {
     font-weight: bold; 
     text-decoration: none;
     color:rgb(28, 74, 80);
} 
.bookcard p.p2 {
    color: gray; 
    font-size: 14px; 
}


footer {
    text-align: center;
    padding: 20px;
}
</style>
</head>
